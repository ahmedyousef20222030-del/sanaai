function getProgressClass(p, status) {
  if (status === 'تم التسليم') return 'done';
  if (p < 30) return 'warning';
  return '';

          <div class="meta-item"><i class="ti ti-package" aria-hidden="true"></i> <strong>${o.qty}</strong> قطعة</div>
          <div class="meta-item"><i class="ti ti-calendar" aria-hidden="true"></i> <strong>${o.deliveryDate}</strong></div>
          <div class="meta-item"><i class="ti ti-clock" aria-hidden="true"></i> <strong class="${isLate ? 'late' : ''}" style="${isLate ? 'color:#C24B2A;' : 'color:#1B7A6E;'}">${o.delivery}</strong></div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-labels">
            <span class="progress-label">تقدم الإنتاج</span>
            <span class="progress-label" style="${o.progress===100 ? 'color:#1B7A6E;' : 'color:#D4A843;'}">${o.progress}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill ${progressClass}" style="width:${o.progress}%;"></div>
          </div>
        </div>
        <div class="card-footer">
          <div class="price-block">
            <div class="price-total">${fmt(o.total)} ج.م</div>
            ${remaining > 0
              ? `<div class="price-remaining"><i class="ti ti-alert-circle" style="font-size:11px;" aria-hidden="true"></i> متبقي ${fmt(remaining)} ج.م</div>`
              : `<div class="price-paid"><i class="ti ti-circle-check" style="font-size:11px;" aria-hidden="true"></i> مسدد بالكامل</div>`}
          </div>
          <div class="card-actions">
            <button class="action-btn" onclick="event.stopPropagation();sendPrompt('عرض إنتاج الطلب ${o.id}')">
              <i class="ti ti-eye" aria-hidden="true"></i> عرض
            </button>
            <button class="action-btn" onclick="event.stopPropagation();sendPrompt('تعديل الطلب ${o.id}')">
              <i class="ti ti-edit" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function filterOrders() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = ORDERS.filter(o => {
    const matchFilter = currentFilter === 'الكل' || o.status === currentFilter;
    const matchSearch = !q || o.id.toLowerCase().includes(q) || o.client.includes(q) || o.details.includes(q);
    return matchFilter && matchSearch;
  });
  const grid = document.getElementById('ordersGrid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <i class="ti ti-inbox-off" aria-hidden="true"></i>
      <p>لا توجد طلبات تطابق البحث</p>
    </div>`;
  } else {
    grid.innerHTML = filtered.map(renderCard).join('');
  }
  document.getElementById('countLabel').textContent = `عرض ${filtered.length} من ${ORDERS.length} طلب`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterOrders();
}

filterOrders();
</script>
